<!doctype html>
<html lang="de">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Bücherladen</title>

        <link rel="stylesheet" href="./styles/fonts.css" />
        <link rel="stylesheet" href="./styles/standard.css" />
        <link rel="stylesheet" href="style.css" />

        <script src="./scripts/db.js" defer></script>
        <script src="./scripts/templates.js" defer></script>
        <script src="./script.js" defer></script>

        <link
            rel="icon"
            type="image/x-icon"
            href="./assets/icons/favicon.png"
        />
    </head>
    <body onload="init()">
        <header class="header">
            <section class="header-content">
                <h1>Mein Bücherladen</h1>
            </section>
        </header>

        <main>
            <section class="book-filter">
                <button
                    onclick="setFilterToAll()"
                    class="filter-btn"
                    id="filterAll"
                >
                    Alle anzeigen
                </button>
                <button
                    onclick="setFilterToFav()"
                    class="filter-btn"
                    id="filterLiked"
                >
                    Nur Favoriten
                </button>
            </section>

            <section class="book-container" id="MyBooks">
                <div>Test</div>
            </section>
        </main>

        <footer class="footer">
            <div class="footer-content">
                <p>&copy; 2026 Andre Strauch</p>
                <a href="https://github.com/andrestrauch" target="_blank">
                    GitHub
                </a>
            </div>
        </footer>
    </body>
</html>
